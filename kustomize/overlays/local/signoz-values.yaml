# SigNoz Helm chart values for local development
# Chart: https://charts.signoz.io / signoz/signoz

fullnameOverride: signoz-local

# -- SigNoz backend
signoz:
  replicaCount: 1
  persistence:
    enabled: false  # emptyDir for SQLite (ephemeral local dev)
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 2Gi
  env:
    signoz_user_root_enabled: "true"
    signoz_user_root_email: "dev@xata.tech"
    signoz_user_root_password: "XataDev1234!"
    signoz_user_root_org_name: "Xata"
    signoz_tokenizer_jwt_secret: "xata-local-dev-jwt-secret-not-for-production"

# -- ClickHouse
clickhouse:
  enabled: true
  layout:
    shardsCount: 1
    replicasCount: 1
  persistence:
    enabled: true
    size: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 4Gi
  zookeeper:
    enabled: true
    replicaCount: 1
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 1Gi

# -- Schema migrator (runs as Helm hook)
schemaMigrator:
  enabled: true

# -- OpenTelemetry Collector
otelCollector:
  replicaCount: 1
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 1Gi
  clusterRole:
    create: true
    rules:
      - apiGroups: [""]
        resources: [pods, namespaces, nodes, nodes/stats, nodes/proxy]
        verbs: [get, list, watch]
      - apiGroups: [apps]
        resources: [replicasets]
        verbs: [get, list, watch]
      - apiGroups: [extensions]
        resources: [replicasets]
        verbs: [get, list, watch]
      - apiGroups: [batch]
        resources: [jobs]
        verbs: [get, list, watch]
  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
            max_recv_msg_size_mib: 16
          http:
            endpoint: 0.0.0.0:4318
      # Scrape CNPG Postgres metrics and auto-discover annotated pods
      prometheus:
        config:
          scrape_configs:
            - job_name: kube-state-metrics
              scrape_interval: 30s
              static_configs:
                - targets:
                    - kube-state-metrics.xata.svc.cluster.local:8080
            - job_name: cnpg-metrics
              scrape_interval: 30s
              scheme: https
              tls_config:
                insecure_skip_verify: true
              kubernetes_sd_configs:
                - role: pod
                  namespaces:
                    names:
                      - xata-clusters
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_label_cnpg_io_podRole]
                  action: keep
                  regex: instance
                - source_labels: [__address__]
                  action: replace
                  regex: ([^:]+)(?::\d+)?
                  target_label: __address__
                  replacement: $1:9187
                - source_labels: [__meta_kubernetes_pod_name]
                  target_label: k8s_pod_name
                - source_labels: [__meta_kubernetes_namespace]
                  target_label: k8s_namespace_name
            - job_name: cnpg-pooler-metrics
              scrape_interval: 30s
              kubernetes_sd_configs:
                - role: pod
                  namespaces:
                    names:
                      - xata-clusters
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_label_cnpg_io_poolerName]
                  action: keep
                  regex: .+
                - source_labels: [__meta_kubernetes_pod_container_port_name]
                  action: keep
                  regex: metrics
                - source_labels: [__meta_kubernetes_pod_name]
                  target_label: k8s_pod_name
                - source_labels: [__meta_kubernetes_namespace]
                  target_label: k8s_namespace_name
                - source_labels: [__meta_kubernetes_pod_label_cnpg_io_poolerName]
                  target_label: pooler_name
            # Scrape cAdvisor for container filesystem throughput metrics
            - job_name: cadvisor
              scrape_interval: 30s
              scheme: https
              tls_config:
                insecure_skip_verify: true
              bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
              kubernetes_sd_configs:
                - role: node
              relabel_configs:
                - action: replace
                  target_label: __metrics_path__
                  replacement: /metrics/cadvisor
              metric_relabel_configs:
                - source_labels: [__name__]
                  action: keep
                  regex: container_fs_(reads|writes)_bytes_total
                - source_labels: [namespace]
                  action: keep
                  regex: xata-clusters
                - source_labels: [pod]
                  target_label: k8s_pod_name
                - source_labels: [namespace]
                  target_label: k8s_namespace_name
            # Auto-discover pods with a port named "metrics"
            - job_name: metrics-port
              scheme: http
              tls_config:
                insecure_skip_verify: true
              kubernetes_sd_configs:
                - role: pod
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_container_port_name]
                  action: keep
                  regex: metrics(-.*)?
                - source_labels: [__meta_kubernetes_pod_ip, __meta_kubernetes_pod_container_port_number]
                  action: replace
                  regex: (.+);(.+)
                  replacement: $1:$2
                  target_label: __address__
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scheme]
                  action: replace
                  regex: (https)
                  target_label: __scheme__
                  replacement: https
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
                  action: replace
                  target_label: __metrics_path__
                  regex: (.+)
                  replacement: $1
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                  action: drop
                  regex: (false)
            # Auto-discover pods with prometheus.io/scrape annotation
            - job_name: annotation-scrape
              scheme: http
              tls_config:
                insecure_skip_verify: true
              kubernetes_sd_configs:
                - role: pod
              relabel_configs:
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
                  action: keep
                  regex: true
                - source_labels: [__meta_kubernetes_pod_container_port_name]
                  action: drop
                  regex: metrics(-.*)?
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scheme]
                  action: replace
                  regex: (https)
                  target_label: __scheme__
                  replacement: https
                - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
                  action: replace
                  target_label: __metrics_path__
                  regex: (.+)
                  replacement: $1
                - source_labels: [__meta_kubernetes_pod_ip, __meta_kubernetes_pod_annotation_prometheus_io_port]
                  action: replace
                  regex: (.+);(\d+)
                  replacement: $1:$2
                  target_label: __address__
                - source_labels: [__address__]
                  action: replace
                  regex: (.+):$
                  replacement: $1:80
                  target_label: __address__
      # Collect container CPU/memory/network metrics from kubelet
      kubeletstats:
        collection_interval: 30s
        auth_type: serviceAccount
        endpoint: https://${env:K8S_NODE_NAME}:10250
        insecure_skip_verify: true
        metric_groups:
          - container
          - pod
    connectors:
      signozmeter:
        metrics_flush_interval: 1h
        dimensions:
          - name: service.name
          - name: deployment.environment
          - name: host.name
    exporters:
      clickhouselogsexporter:
        dsn: tcp://${env:CLICKHOUSE_USER}:${env:CLICKHOUSE_PASSWORD}@${env:CLICKHOUSE_HOST}:${env:CLICKHOUSE_PORT}/${env:CLICKHOUSE_LOG_DATABASE}
        timeout: 10s
        use_new_schema: true
      clickhousetraces:
        datasource: tcp://${env:CLICKHOUSE_USER}:${env:CLICKHOUSE_PASSWORD}@${env:CLICKHOUSE_HOST}:${env:CLICKHOUSE_PORT}/${env:CLICKHOUSE_TRACE_DATABASE}
        low_cardinal_exception_grouping: ${env:LOW_CARDINAL_EXCEPTION_GROUPING}
        use_new_schema: true
      metadataexporter:
        cache:
          provider: in_memory
        dsn: tcp://${env:CLICKHOUSE_USER}:${env:CLICKHOUSE_PASSWORD}@${env:CLICKHOUSE_HOST}:${env:CLICKHOUSE_PORT}/signoz_metadata
        tenant_id: ${env:TENANT_ID}
        timeout: 10s
      signozclickhousemeter:
        dsn: tcp://${env:CLICKHOUSE_USER}:${env:CLICKHOUSE_PASSWORD}@${env:CLICKHOUSE_HOST}:${env:CLICKHOUSE_PORT}/${env:CLICKHOUSE_METER_DATABASE}
        sending_queue:
          enabled: false
        timeout: 45s
      signozclickhousemetrics:
        dsn: tcp://${env:CLICKHOUSE_USER}:${env:CLICKHOUSE_PASSWORD}@${env:CLICKHOUSE_HOST}:${env:CLICKHOUSE_PORT}/${env:CLICKHOUSE_DATABASE}
        timeout: 45s
    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
      pprof:
        endpoint: localhost:1777
      zpages:
        endpoint: localhost:55679
    processors:
      resource:
        attributes:
          - key: deployment.environment.name
            value: local
            action: upsert
          - key: cluster.name
            value: kind
            action: upsert
      batch:
        send_batch_size: 50000
        timeout: 1s
      batch/meter:
        send_batch_max_size: 25000
        send_batch_size: 20000
        timeout: 1s
      resourcedetection:
        detectors: ["env", "system"]
      k8sattributes:
        auth_type: "serviceAccount"
        passthrough: false
        extract:
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.deployment.name
            - k8s.namespace.name
            - k8s.node.name
            - k8s.pod.start_time
            - k8s.container.name
            - k8s.replicaset.name
            - k8s.daemonset.name
            - k8s.statefulset.name
            - k8s.cronjob.name
            - k8s.job.name
          labels:
            - tag_name: app.label.component
              key: app.kubernetes.io/component
              from: pod
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: connection
      signozspanmetrics/delta:
        aggregation_temporality: AGGREGATION_TEMPORALITY_DELTA
        dimensions:
          - default: default
            name: service.namespace
          - default: default
            name: deployment.environment
          - name: signoz.collector.id
        dimensions_cache_size: 100000
        latency_histogram_buckets:
          - 100us
          - 1ms
          - 2ms
          - 6ms
          - 10ms
          - 50ms
          - 100ms
          - 250ms
          - 500ms
          - 1000ms
          - 1400ms
          - 2000ms
          - 5s
          - 10s
          - 20s
          - 40s
          - 60s
        metrics_exporter: signozclickhousemetrics
      filter/drop-cnpg-settings:
        metrics:
          exclude:
            match_type: strict
            metric_names:
              - cnpg_pg_settings_setting
      filter/drop-otelcol-internals:
        metrics:
          exclude:
            match_type: strict
            metric_names:
              - otelcol_k8s.pod.association_total
              - otelcol_otelcol.k8s.pod.association_total
    service:
      extensions:
        - health_check
        - zpages
        - pprof
      pipelines:
        logs:
          receivers:
            - otlp
          processors:
            - resource
            - resourcedetection
            - k8sattributes
            - batch
          exporters:
            - clickhouselogsexporter
            - metadataexporter
            - signozmeter
        metrics:
          receivers:
            - otlp
            - prometheus
            - kubeletstats
          processors:
            - resource
            - resourcedetection
            - k8sattributes
            - batch
            - filter/drop-cnpg-settings
            - filter/drop-otelcol-internals
          exporters:
            - metadataexporter
            - signozclickhousemetrics
            - signozmeter
        metrics/meter:
          receivers:
            - signozmeter
          processors:
            - batch/meter
          exporters:
            - signozclickhousemeter
        traces:
          receivers:
            - otlp
          processors:
            - resource
            - resourcedetection
            - k8sattributes
            - signozspanmetrics/delta
            - batch
          exporters:
            - clickhousetraces
            - metadataexporter
            - signozmeter
      telemetry:
        logs:
          encoding: json

# -- Disable unused sub-charts
signoz-otel-gateway:
  enabled: false
redpanda:
  enabled: false
postgresql:
  enabled: false
