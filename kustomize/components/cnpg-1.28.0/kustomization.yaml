apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

resources:
  - https://raw.githubusercontent.com/cloudnative-pg/cloudnative-pg/release-1.28/releases/cnpg-1.28.0.yaml
  - https://github.com/xataio/cnpg-i-scale-to-zero/releases/download/v0.1.8/manifest.yaml

  - network.yaml
  - custom-metrics.yaml
  - cnpg-rollout-config.yaml

  # Pod and ServiceMonitor from the prometheus-operator. These are required by
  # CNPG[1] since it wants to create this resource as monitored is enabled. We
  # do not run Prometheus in our clusters, but we can still use the CRDs for
  # discovery in OTEL and the like.
  #
  # [1]: https://cloudnative-pg.io/documentation/1.25/monitoring/#monitoring-the-operator
  - https://raw.githubusercontent.com/prometheus-operator/prometheus-operator/v0.82.0/example/prometheus-operator-crd/monitoring.coreos.com_servicemonitors.yaml
  - https://raw.githubusercontent.com/prometheus-operator/prometheus-operator/v0.82.0/example/prometheus-operator-crd/monitoring.coreos.com_podmonitors.yaml

patches:
  - path: patch-cnpg.yaml.patch
    target:
      kind: Deployment
      name: cnpg-controller-manager
  - path: patch-scale-to-zero-rbac.yaml.patch
    target:
      kind: ClusterRole
      name: cnpg-scale-to-zero-sidecar-role
  # Add dataplane tolerations to CNPG deployments (same as base/dataplane applies to its resources)
  - target:
      kind: Deployment
      namespace: cnpg-system
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: dummy
      spec:
        template:
          spec:
            tolerations:
              - key: "xata.io/workload"
                value: "dataplane"
                effect: "NoSchedule"
